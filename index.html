<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Rota - EMN1</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://onildopr.github.io/rodacoop.ui/css/rodacoop.css">
    <style>
        .list-section { max-height: 300px; overflow-y: auto; font-size: 12px; font-family: monospace; }
        .brand-card { border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="rk-scope">

<div class="container pt-4">
    <div class="row">
        <div class="col-sm-1"></div>
        <div class="col-sm-10">
            
            <div id="initial-interface">
                <div class="text-center mb-3">
                    <h2 class="brand-title">Conferência de Rota</h2>
                    <div class="brand-subtle">Filtro de IDs 11 dígitos • EMN1</div>
                </div>

                <div class="card mb-3 brand-card">
                    <div class="card-body">
                        <h5 class="mb-2 brand-title" style="font-size:16px;">Importar Dados</h5>
                        <textarea id="html-input" class="form-control mb-3" rows="8" placeholder="Cole o HTML bruto da rota aqui..."></textarea>
                        <button id="extract-btn" class="btn btn-primary btn-block">Iniciar Conferência da Rota</button>
                    </div>
                </div>
            </div>

            <div id="conference-interface" class="d-none">
                <div class="text-center mb-3">
                    <h2 id="route-title" class="brand-title">Carregando Rota...</h2>
                    <div id="id-rota-display" class="brand-subtle">ID: ---</div>
                </div>

                <div class="card mb-3 brand-card">
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-6">
                                <div class="brand-subtle">PENDENTES</div>
                                <h4 id="extracted-total">0</h4>
                            </div>
                            <div class="col-6">
                                <div class="brand-subtle text-success">RECEBIDOS</div>
                                <h4 id="verified-total">0</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <input type="text" id="barcode-input" class="form-control form-control-lg text-center mb-3" placeholder="Leia o código de barras" autofocus>

                <div class="row text-center mt-4">
                    <div class="col-md-4">
                        <h6 class="text-success">Recebidos</h6>
                        <ul id="conferidos-list" class="list-group list-section"></ul>
                    </div>
                    <div class="col-md-4">
                        <h6 class="text-danger">Pendentes</h6>
                        <ul id="faltantes-list" class="list-group list-section"></ul>
                    </div>
                    <div class="col-md-4">
                        <h6 class="text-warning">Outra Área</h6>
                        <ul id="fora-rota-list" class="list-group list-section"></ul>
                    </div>
                </div>

                <div class="text-center my-4">
                    <button id="generate-report-btn" class="btn btn-success btn-block mb-2">GERAR MENSAGEM WHATSAPP 📱</button>
                    <button id="back-btn" class="btn btn-outline-secondary btn-block btn-sm">Voltar ao Início</button>
                </div>
            </div>

        </div>
        <div class="col-sm-1"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="conferencia.js"></script>
</body>
</html>
