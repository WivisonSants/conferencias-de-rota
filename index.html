<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Rota - EMN1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .container { max-width: 700px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #conferidos-list, #faltantes-list { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: #fff; }
        .list-group-item { font-family: monospace; font-size: 13px; padding: 5px 10px; }
        .list-group-item-success { background-color: #d1e7dd; color: #0f5132; }
        .list-group-item-danger { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body>

<div class="container mx-auto">
    <div id="initial-interface">
        <h4 class="mb-3 text-primary">📦 Importar Rota (HTML)</h4>
        <textarea id="html-input" class="form-control mb-3" rows="10" placeholder="Cole o código HTML da página do Mercado Livre aqui..."></textarea>
        <button id="extract-btn" class="btn btn-primary btn-lg w-100">Iniciar Conferência 🚀</button>
    </div>

    <div id="conference-interface" class="d-none">
        <h4 class="text-center mb-3">Painel de Bipagem</h4>
        
        <div class="row text-center mb-3">
            <div class="col-6">
                <div class="p-2 border rounded bg-light">
                    <strong>Total na Rota:</strong> <br>
                    <span id="extracted-total" class="h4">0</span>
                </div>
            </div>
            <div class="col-6">
                <div class="p-2 border rounded bg-light">
                    <strong>Bipados:</strong> <br>
                    <span id="verified-total" class="h4 text-success">0</span>
                </div>
            </div>
        </div>

        <input type="text" id="barcode-input" class="form-control form-control-lg mb-3 text-center" placeholder="Bipe o ID de 11 dígitos aqui" autofocus>

        <div class="row">
            <div class="col-6">
                <h6 class="text-success">✅ Conferidos</h6>
                <ul id="conferidos-list" class="list-group"></ul>
            </div>
            <div class="col-6">
                <h6 class="text-danger">❌ Faltantes</h6>
                <ul id="faltantes-list" class="list-group"></ul>
            </div>
        </div>

        <hr>
        
        <button id="generate-report-btn" class="btn btn-success btn-lg w-100 mb-2">Copiar Relatório WhatsApp 📱</button>
        <button id="back-btn" class="btn btn-outline-secondary w-100">Reiniciar / Nova Rota</button>
    </div>
</div>

<script src="conferencia.js"></script>
</body>
</html>
