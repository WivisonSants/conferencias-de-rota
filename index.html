<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferência de Rota - Rodacoop</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://onildopr.github.io/rodacoop.ui/css/rodacoop.css">
  <style>
    .list-section { height: 350px; overflow-y: auto; background: #fff; border: 1px solid #dee2e6; border-radius: 4px; padding: 0; }
    .list-group-item { padding: 4px 8px; font-family: monospace; font-size: 13px; border-bottom: 1px solid #eee !important; list-style: none; }
    #barcode-input { font-weight: bold; border: 3px solid #ff6a00; height: 55px; font-size: 1.5rem; text-align: center; }
    .btn-orange { background-color: #ff6a00; color: white; font-weight: bold; }
    .btn-black { background-color: #000; color: white; font-weight: bold; }
  </style>
</head>
<body class="rk-scope">

<div class="container pt-4">
  <div id="tela-inicial">
    <div class="text-center mb-4">
      <h2 class="brand-title">Conferência de Rota</h2>
      <div class="brand-subtle">EMN1 - Imperatriz</div>
    </div>

    <div class="card mb-3 brand-card">
      <div class="card-body">
        <h5 class="brand-title" style="font-size:16px;">Importar Rota (HTML)</h5>
        <textarea id="html-input" class="form-control mb-3" rows="10" placeholder="Cole aqui o código fonte (Ctrl+U)"></textarea>
        <button id="import-btn" class="btn btn-primary btn-lg btn-block">Importar/Salvar Rotas do HTML</button>
      </div>
    </div>
    <button class="btn btn-black btn-block">FECHAMENTO DIÁRIO</button>
  </div>

  <div id="tela-conferencia" class="d-none">
    <div class="text-center mb-3">
      <h2 id="nome-rota" class="brand-title" style="color:#ff6a00">---</h2>
      <h5 id="id-rota" class="brand-subtle">ID: ---</h5>
    </div>

    <div class="card mb-3 brand-card text-center">
      <div class="card-body">
        <div class="row">
          <div class="col-6"><div>PENDENTES</div><strong id="total-pendente" style="font-size: 30px;">0</strong></div>
          <div class="col-6"><div>RECEBIDOS</div><strong id="total-recebido" style="font-size: 30px;" class="text-success">0</strong></div>
        </div>
        <div class="progress mt-3"><div id="progresso" class="progress-bar bg-warning" style="width: 0%"></div></div>
      </div>
    </div>

    <input type="text" id="barcode-input" class="form-control mb-3" placeholder="BIPE O PACOTE" autofocus autocomplete="off">

    <div class="row text-center">
      <div class="col-md-3"><h6>Recebidos</h6><ul id="lista-ok" class="list-section"></ul></div>
      <div class="col-md-3"><h6>Pendentes</h6><ul id="lista-pendente" class="list-section"></ul></div>
      <div class="col-md-3"><h6>Fora de Rota</h6><ul id="lista-fora" class="list-section"></ul></div>
      <div class="col-md-3"><h6>Duplicados</h6><ul id="lista-dup" class="list-section"></ul></div>
    </div>

    <button id="btn-whatsapp" class="btn btn-success btn-lg btn-block mt-4">GERAR MENSAGEM WHATSAPP</button>
    <button onclick="location.reload()" class="btn btn-link btn-block text-muted">Voltar</button>
  </div>
</div>

<script>
let dados = { pendentes: [], recebidos: [], fora: [], id: "", nome: "" };

document.getElementById('import-btn').onclick = function() {
    const texto = document.getElementById('html-input').value;
    if(!texto) return alert("Cole o HTML primeiro!");

    // 1. Extrai o Nome da Rota do <title>
    const nomeMatch = texto.match(/<title id="root-title">.*?\|\s*(.*?)<\/title>/);
    dados.nome = nomeMatch ? nomeMatch[1].trim() : "Rota Desconhecida";

    // 2. Extrai o ID da Rota da URL ou do texto (ex: 356750297)
    const idMatch = texto.match(/detail\/(\d+)/);
    dados.id = idMatch ? idMatch[1] : "---";

    // 3. O PULO DO GATO: Busca todos os IDs de 11 dígitos
    // Filtramos para ignorar o ID da própria rota (que tem 9 dígitos no seu exemplo)
    const achados = texto.match(/\b\d{11}\b/g);

    if (achados && achados.length > 0) {
        dados.pendentes = [...new Set(achados)];
        
        document.getElementById('nome-rota').innerText = "Rota: " + dados.nome;
        document.getElementById('id-rota').innerText = "ID: " + dados.id;
        document.getElementById('tela-inicial').classList.add('d-none');
        document.getElementById('tela-conferencia').classList.remove('d-none');
        
        atualizar();
        setTimeout(() => document.getElementById('barcode-input').focus(), 500);
    } else {
        alert("Nenhum pacote encontrado. Verifique se copiou o código fonte (Ctrl+U) corretamente.");
    }
};

document.getElementById('barcode-input').onkeypress = function(e) {
    if (e.key === 'Enter') {
        const bip = this.value.trim();
        if (!bip) return;

        if (dados.pendentes.includes(bip)) {
            dados.pendentes = dados.pendentes.filter(p => p !== bip);
            dados.recebidos.unshift(bip);
            tocar(880);
        } else if (dados.recebidos.includes(bip)) {
            alert("Já foi conferido!");
        } else {
            if(!dados.fora.includes(bip)) dados.fora.unshift(bip);
            tocar(350);
        }
        this.value = "";
        atualizar();
    }
};

document.getElementById('btn-whatsapp').onclick = function() {
    const total = dados.pendentes.length + dados.recebidos.length;
    const ds = total > 0 ? ((dados.recebidos.length / total) * 100).toFixed(1) : "0.0";
    const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    let msg = `↩ RTS - Rota: ${dados.id}\n🏭 SVC/XPT: EMN1 - Imperatriz\n🕗 ORHC: ${hora} h\n🟢 %DS: ${ds} %\n🟡 Pendentes: ${dados.pendentes.length}\n🔴 Insucessos: ${dados.fora.length}\n\n♎ Justificativa:\nRota ${dados.nome}\nrodacoop | Motorista\n\n`;
    if(dados.fora.length > 0) msg += `*Fora de Rota:*\n${dados.fora.join('\n')}\n`;
    if(dados.pendentes.length > 0) msg += `\n*Pendentes:*\n${dados.pendentes.join('\n')}`;
    navigator.clipboard.writeText(msg).then(() => alert("Copiado!"));
};

function atualizar() {
    document.getElementById('total-pendente').innerText = dados.pendentes.length;
    document.getElementById('total-recebido').innerText = dados.recebidos.length;
    const total = dados.pendentes.length + dados.recebidos.length;
    document.getElementById('progresso').style.width = (total > 0 ? (dados.recebidos.length/total*100) : 0) + "%";
    document.getElementById('lista-ok').innerHTML = dados.recebidos.map(i => `<li class="list-group-item text-success">✅ ${i}</li>`).join('');
    document.getElementById('lista-pendente').innerHTML = dados.pendentes.map(i => `<li class="list-group-item text-danger">❌ ${i}</li>`).join('');
    document.getElementById('lista-fora').innerHTML = dados.fora.map(i => `<li class="list-group-item text-warning">⚠️ ${i}</li>`).join('');
}

function tocar(f) {
    const c = new AudioContext();
    const o = c.createOscillator();
    o.frequency.value = f;
    o.connect(c.destination);
    o.start(); o.stop(c.currentTime + 0.1);
}
</script>
</body>
</html>
