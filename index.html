<!DOCTYPE html>
<html lang="pt-BR" ng-app="RodaCoopApp">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Conferência de Rota | Rodacoop</title>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://onildopr.github.io/rodacoop.ui/css/rodacoop.css">
    
    <style>
        /* Ajustes finos para garantir a fidelidade visual */
        .rk-scope .list-section { height: 320px; }
        .rk-scope .list-group-item { padding: 5px 10px; font-family: monospace; font-size: 11px; }
        #barcode-input { font-weight: bold; font-size: 1.5rem; border: 3px solid #ff6a00; height: 60px; text-align: center; }
        .btn-success-lg { background-color: #28a745; color: white; font-weight: bold; height: 60px; font-size: 18px; width: 100%; border-radius: 8px; border: none; }
    </style>
</head>
<body class="rk-scope">

<div class="container pt-4">
    <div id="setup-view">
        <div class="text-center mb-4">
            <div class="brand-logo-container">
                <h2 class="brand-title">Conferência de Rota</h2>
                <div class="brand-subtle">ESTILO RODACOOP - FILTRO DINÂMICO</div>
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="brand-title" style="font-size:16px;">Importar do HTML (Ctrl+U)</h5>
                <textarea id="html-input" class="form-control mb-3" rows="6" placeholder="Pressione Ctrl+U no ML, Ctrl+A, copie e cole o código aqui..."></textarea>
                <button id="import-btn" class="btn btn-primary btn-lg btn-block font-weight-bold">ANALISAR ROTA</button>
            </div>
        </div>
    </div>

    <div id="work-view" class="d-none">
        <div class="text-center mb-3">
            <h2 id="ui-route-id" class="brand-title" style="color:#ff6a00; font-size: 28px;">---</h2>
            <h5 id="ui-driver" class="brand-subtle">Motorista: ---</h5>
        </div>

        <div class="card mb-3 text-center shadow-sm">
            <div class="card-body py-2">
                <div class="row">
                    <div class="col-4 border-right">
                        <h6>PENDENTES</h6>
                        <strong id="count-p" style="font-size: 30px;">0</strong>
                    </div>
                    <div class="col-4 border-right text-success">
                        <h6>RECEBIDOS</h6>
                        <strong id="count-ok" style="font-size: 30px;">0</strong>
                    </div>
                    <div class="col-4 text-danger">
                        <h6>FALHAS</h6>
                        <strong id="count-fail" style="font-size: 30px;">0</strong>
                    </div>
                </div>
                <div class="progress mt-2">
                    <div id="ui-bar" class="progress-bar bg-warning" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <input type="text" id="barcode-input" class="form-control mb-4" placeholder="BIPE O PACOTE AQUI" autofocus autocomplete="off">

        <div class="row text-center no-gutters mb-4">
            <div class="col-3 px-1"><h6>OK</h6><ul id="list-ok" class="list-section"></ul></div>
            <div class="col-3 px-1"><h6>Pendente</h6><ul id="list-pending" class="list-section"></ul></div>
            <div class="col-3 px-1"><h6>Insucesso</h6><ul id="list-fail" class="list-section"></ul></div>
            <div class="col-3 px-1"><h6>Fora</h6><ul id="list-out" class="list-section"></ul></div>
        </div>

        <div class="card mb-3 shadow-sm">
            <div class="card-body p-2">
                <label class="small font-weight-bold text-primary">RELATÓRIO WHATSAPP:</label>
                <textarea id="whatsapp-preview" class="form-control" rows="6" readonly style="font-family: monospace; font-size: 12px;"></textarea>
            </div>
        </div>

        <button id="copy-btn" class="btn btn-success-lg mb-3">COPIAR MENSAGEM WHATSAPP</button>
        <button onclick="location.reload()" class="btn btn-link btn-block text-muted">Sair da Rota</button>
    </div>
</div>

<script>
let app = { id: "", driver: "", orh: "00:00", p: [], ok: [], fail: [], out: [] };

document.getElementById('import-btn').onclick = function() {
    const raw = document.getElementById('html-input').value;
    if(!raw) return alert("Por favor, cole o código fonte!");

    // Extração de dados (Motor para o layout novo do ML)
    app.id = (raw.match(/detail\/(\d+)/) || raw.match(/(\d{9,})/) || ["", "---"])[1];
    app.driver = (raw.match(/"driverName":"(.*?)"/) || raw.match(/"driver_name":"(.*?)"/) || ["", "Não identificado"])[1];
    app.orh = (raw.match(/"durationText":"(.*?)"/) || raw.match(/"duration":"(.*?)"/) || ["", "---"])[1];

    // Captura de IDs e Status
    const regex = /"id":(\d{11}),.*?"status":"(.*?)"(?:.*?"substatus":"(.*?)")?/g;
    let m;
    let vistos = new Set();
    app.p = []; app.ok = []; app.fail = [];

    while ((m = regex.exec(raw)) !== null) {
        let id = m[1];
        if (vistos.has(id)) continue;
        vistos.add(id);

        let status = m[2];
        let motivo = (m[3] || "").replace(/_/g, ' ');
        let item = { id, motivo };

        if (status === 'delivered') app.ok.push(item);
        else if (status === 'not_delivered' || status === 'cancelled') app.fail.push(item);
        else app.p.push(item);
    }

    if(vistos.size > 0) {
        document.getElementById('setup-view').classList.add('d-none');
        document.getElementById('work-view').classList.remove('d-none');
        document.getElementById('ui-route-id').innerText = "Rota: " + app.id;
        document.getElementById('ui-driver').innerText = "Motorista: " + app.driver;
        render();
    } else {
        alert("Nenhum pacote encontrado. Use Ctrl+U e copie o código TODO.");
    }
};

document.getElementById('barcode-input').onkeypress = function(e) {
    if (e.key === 'Enter') {
        const val = this.value.trim();
        if(!val) return;
        let pIdx = app.p.findIndex(x => x.id === val);
        if (pIdx !== -1) {
            app.ok.unshift(app.p.splice(pIdx, 1)[0]);
        } else {
            if(!app.out.includes(val)) app.out.unshift(val);
        }
        this.value = ""; render();
    }
};

function render() {
    const total = app.p.length + app.ok.length + app.fail.length;
    const ds = total > 0 ? ((app.ok.length / total) * 100).toFixed(1) : "0.0";
    
    document.getElementById('count-p').innerText = app.p.length;
    document.getElementById('count-ok').innerText = app.ok.length;
    document.getElementById('count-fail').innerText = app.fail.length;
    document.getElementById('ui-bar').style.width = ds + "%";

    document.getElementById('list-ok').innerHTML = app.ok.map(x => `<li class="list-group-item text-success">✅ ${x.id}</li>`).join('');
    document.getElementById('list-pending').innerHTML = app.p.map(x => `<li class="list-group-item text-danger">❌ ${x.id}</li>`).join('');
    document.getElementById('list-fail').innerHTML = app.fail.map(x => `<li class="list-group-item text-warning">⚠️ ${x.id}<br><small>${x.motivo}</small></li>`).join('');
    document.getElementById('list-out').innerHTML = app.out.map(x => `<li class="list-group-item text-dark">📦 ${x}</li>`).join('');

    let msg = `↩ RTS - Rota: ${app.id}\n🏭 SVC/XPT: EMN1 - Imperatriz\n🕗 ORH: ${app.orh}\n🟢 %DS: ${ds} %\n🟡 Pendentes: ${app.p.length}\n🔴 Insucessos: ${app.fail.length}\n\n♎ Justificativa:\nMotorista: ${app.driver}\nrodacoop | Conferência\n`;
    document.getElementById('whatsapp-preview').value = msg;
}

document.getElementById('copy-btn').onclick = function() {
    navigator.clipboard.writeText(document.getElementById('whatsapp-preview').value);
    this.innerText = "✅ COPIADO!";
    setTimeout(() => this.innerText = "COPIAR MENSAGEM WHATSAPP", 2000);
};
</script>
</body>
</html>
