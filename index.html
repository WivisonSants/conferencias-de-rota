<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferência de Rota - IDs Pendentes</title>
  
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://onildopr.github.io/rodacoop.ui/css/rodacoop.css">
  
  <style>
    .list-section { height: 350px; overflow-y: auto; background: #fff; border: 1px solid #dee2e6; border-radius: 4px; list-style: none; padding: 0; }
    .list-group-item { padding: 6px 10px; font-family: monospace; font-size: 13px; border-bottom: 1px solid #eee !important; margin-bottom: 0; }
    #barcode-input { font-weight: bold; font-size: 1.3rem; border: 2px solid #ff6a00; height: 55px; }
    .btn-orange { background-color: #ff6a00; color: white; border: none; font-weight: bold; }
    .btn-black { background-color: #000; color: white; border: none; font-weight: bold; }
  </style>
</head>
<body class="rk-scope">

<div class="container pt-4">
  <div id="initial-interface">
    <div class="text-center mb-3">
      <h2 class="brand-title">Conferência de Rota</h2>
      <div class="brand-subtle">IDs pendentes / insucessos</div>
    </div>

    <div class="card mb-3 brand-card">
      <div class="card-body">
        <h5 class="mb-2 brand-title" style="font-size:16px;">Rotas salvas</h5>
        <div class="row">
          <div class="col-md-8"><select id="saved-routes" class="form-control"><option value="">(Nenhuma selecionada)</option></select></div>
          <div class="col-md-4 mt-2 mt-md-0"><button class="btn btn-orange btn-block">Carregar rota</button></div>
        </div>
        <div class="row mt-2">
          <div class="col-md-12"><button class="btn btn-black btn-block">FECHAMENTO DIÁRIO</button></div>
        </div>
      </div>
    </div>

    <textarea id="html-input" class="form-control mb-3" rows="8" placeholder="COLE O HTML AQUI (Ctrl+U, Ctrl+A, Ctrl+C e cole)"></textarea>
    <button id="extract-btn" class="btn btn-primary btn-lg btn-block">Importar/Salvar Rotas do HTML</button>
  </div>

  <div id="conference-interface" class="d-none">
    <div class="text-center mb-3">
      <h2 id="route-title" class="brand-title" style="color: #ff6a00;">Nome da Rota</h2>
      <h4 id="id-rota-display" class="brand-subtle">ID: ---</h4>
    </div>

    <div class="card mb-3 brand-card">
      <div class="card-body text-center">
        <div class="row">
          <div class="col-6"><div>PENDENTES</div><strong id="extracted-total" style="font-size: 25px;">0</strong></div>
          <div class="col-6"><div>RECEBIDOS</div><strong id="verified-total" style="font-size: 25px;" class="text-success">0</strong></div>
        </div>
        <div class="progress mt-3"><div id="progress-bar" class="progress-bar bg-warning" style="width: 0%"></div></div>
      </div>
    </div>

    <input type="text" id="barcode-input" class="form-control mb-3 text-center" placeholder="BIPE O PACOTE AQUI" autofocus>

    <div class="row text-center mt-4">
      <div class="col-md-3"><h6>Recebidos</h6><ul id="conferidos-list" class="list-section"></ul></div>
      <div class="col-md-3"><h6>Pendentes</h6><ul id="faltantes-list" class="list-section"></ul></div>
      <div class="col-md-3"><h6>Fora de Rota</h6><ul id="fora-rota-list" class="list-section"></ul></div>
      <div class="col-md-3"><h6>Duplicados</h6><ul id="duplicados-list" class="list-section"></ul></div>
    </div>

    <button id="generate-report-btn" class="btn btn-success btn-lg btn-block mt-4">GERAR MENSAGEM WHATSAPP 📱</button>
    <button onclick="location.reload()" class="btn btn-link btn-block text-muted">Limpar e Voltar</button>
  </div>
</div>

<script>
let bancoDeDados = { pendentes: [], conferidos: [], foraRota: [], idRota: "", nomeRota: "" };

// BOTÃO IMPORTAR - VERSÃO CORRIGIDA
document.getElementById('extract-btn').onclick = function() {
    const textoBruto = document.getElementById('html-input').value;
    if(!textoBruto) return alert("Cole o conteúdo primeiro!");

    // 1. Pega ID da Rota
    const idRotaMatch = textoBruto.match(/detail\/(\d+)/);
    bancoDeDados.idRota = idRotaMatch ? idRotaMatch[1] : "Não identificado";

    // 2. Tenta pegar o nome da rota (ex: F18_AM2)
    const nomeMatch = textoBruto.match(/\|\s*([^|]+?)\s*\|/);
    bancoDeDados.nomeRota = nomeMatch ? nomeMatch[1].trim() : "EMN1";

    // 3. BUSCA IDs (Pega tudo que tem 11 números seguidos)
    // O segredo está aqui: o match(/\b\d{11}\b/g) ignora o HTML e pega só os números
    let idsEncontrados = textoBruto.match(/\b\d{11}\b/g);

    if(idsEncontrados && idsEncontrados.length > 0) {
        // Limpa duplicados e atualiza banco
        bancoDeDados.pendentes = [...new Set(idsEncontrados)];
        bancoDeDados.conferidos = [];
        bancoDeDados.foraRota = [];

        // Atualiza Interface
        document.getElementById('route-title').innerText = "Rota: " + bancoDeDados.nomeRota;
        document.getElementById('id-rota-display').innerText = "ID: " + bancoDeDados.idRota;
        document.getElementById('initial-interface').classList.add('d-none');
        document.getElementById('conference-interface').classList.remove('d-none');
        
        atualizarPainel();
        setTimeout(() => document.getElementById('barcode-input').focus(), 500);
    } else {
        alert("Nenhum ID de 11 dígitos foi encontrado no texto colado. Verifique se copiou a página inteira.");
    }
};

// BIPAGEM E SOM
document.getElementById('barcode-input').onkeypress = function(e) {
    if (e.key === 'Enter') {
        const id = this.value.trim();
        if (!id) return;

        if (bancoDeDados.pendentes.includes(id)) {
            bancoDeDados.pendentes = bancoDeDados.pendentes.filter(p => p !== id);
            bancoDeDados.conferidos.unshift(id);
            tocarSom(880);
        } else if (bancoDeDados.conferidos.includes(id)) {
            alert("Já conferido!");
        } else {
            if(!bancoDeDados.foraRota.includes(id)) bancoDeDados.foraRota.unshift(id);
            tocarSom(350);
        }
        this.value = "";
        atualizarPainel();
    }
};

// RELATÓRIO WHATSAPP
document.getElementById('generate-report-btn').onclick = function() {
    const total = bancoDeDados.pendentes.length + bancoDeDados.conferidos.length;
    const ds = total > 0 ? ((bancoDeDados.conferidos.length / total) * 100).toFixed(1) : "0.0";
    const agora = new Date();
    const hora = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');

    let msg = `↩ RTS - Rota: ${bancoDeDados.idRota}\n🏭 SVC/XPT: EMN1 - Imperatriz\n🕗 ORHC: ${hora} h\n🟢 %DS: ${ds} %\n🟡 Pendentes: ${bancoDeDados.pendentes.length}\n🔴 Insucessos: ${bancoDeDados.foraRota.length}\n\n♎ Justificativa:\nRota ${bancoDeDados.nomeRota}\nrodacoop | Motorista\n\n`;
    
    if(bancoDeDados.foraRota.length > 0) {
        msg += `*IDs Outra Área:*\n`;
        bancoDeDados.foraRota.forEach(id => msg += `${id}\n`);
    }
    
    if(bancoDeDados.pendentes.length > 0) {
        msg += `\n*IDs Pendentes:*\n`;
        bancoDeDados.pendentes.forEach(id => msg += `${id}\n`);
    }

    navigator.clipboard.writeText(msg).then(() => alert("Copiado!"));
};

function atualizarPainel() {
    document.getElementById('extracted-total').innerText = bancoDeDados.pendentes.length;
    document.getElementById('verified-total').innerText = bancoDeDados.conferidos.length;
    const total = bancoDeDados.pendentes.length + bancoDeDados.conferidos.length;
    const perc = total > 0 ? (bancoDeDados.conferidos.length / total) * 100 : 0;
    document.getElementById('progress-bar').style.width = perc + "%";

    document.getElementById('conferidos-list').innerHTML = bancoDeDados.conferidos.map(i => `<li class="list-group-item text-success">✅ ${i}</li>`).join('');
    document.getElementById('faltantes-list').innerHTML = bancoDeDados.pendentes.map(i => `<li class="list-group-item text-danger">❌ ${i}</li>`).join('');
    document.getElementById('fora-rota-list').innerHTML = bancoDeDados.foraRota.map(i => `<li class="list-group-item text-warning">⚠️ ${i}</li>`).join('');
}

function tocarSom(f) {
    try {
        const c = new AudioContext();
        const o = c.createOscillator();
        o.frequency.value = f;
        o.connect(c.destination);
        o.start(); o.stop(c.currentTime + 0.1);
    } catch(e) {}
}
</script>
</body>
</html>
