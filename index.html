<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Rota | Rodacoop</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://onildopr.github.io/rodacoop.ui/css/rodacoop.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .list-section { height: 300px; overflow-y: auto; background: #fff; border: 1px solid #dee2e6; border-radius: 4px; padding: 0; }
        .list-group-item { padding: 5px 8px; font-family: monospace; font-size: 11px; border-bottom: 1px solid #eee !important; }
        .motivo-tag { font-size: 9px; color: #d9534f; display: block; font-weight: bold; text-transform: uppercase; }
        #barcode-input { font-weight: bold; font-size: 1.5rem; border: 3px solid #ff6a00; height: 55px; text-align: center; }
        .btn-orange { background-color: #ff6a00; color: #fff; font-weight: bold; }
        .btn-black { background-color: #000; color: #fff; font-weight: bold; }
        #whatsapp-preview { font-family: monospace; font-size: 12px; background-color: #f8f9fa; border: 1px solid #ccc; color: #333; resize: none; }
    </style>
</head>
<body class="rk-scope">

<div class="container pt-3">
    <div id="setup-view">
        <div class="text-center mb-3">
            <h2 class="brand-title">Conferência de Rota</h2>
            <p class="text-muted">Filtro de Precisão - 88 Pacotes</p>
        </div>
        <div class="card brand-card mb-3">
            <div class="card-body">
                <label class="font-weight-bold">Importar Código Fonte (Ctrl+U):</label>
                <textarea id="html-input" class="form-control mb-3" rows="5" placeholder="Cole o código aqui..."></textarea>
                <button id="import-btn" class="btn btn-primary btn-block btn-lg">ANALISAR ROTA</button>
            </div>
        </div>
        <button class="btn btn-black btn-block">FECHAMENTO DIÁRIO</button>
    </div>

    <div id="work-view" class="d-none">
        <div class="text-center mb-2">
            <h3 id="route-name-ui" class="text-orange font-weight-bold">---</h3>
            <span id="driver-ui" class="badge badge-dark p-2">Motorista: ---</span>
        </div>

        <div class="card mb-3 shadow-sm">
            <div class="card-body py-2">
                <div class="row text-center">
                    <div class="col-4 border-right"><h6>PENDENTES</h6><b id="ui-pending" class="h4">0</b></div>
                    <div class="col-4 border-right"><h6>ENTREGUES</h6><b id="ui-done" class="h4 text-success">0</b></div>
                    <div class="col-4"><h6>ERROS</h6><b id="ui-fail" class="h4 text-danger">0</b></div>
                </div>
                <div class="progress mt-2"><div id="ui-bar" class="progress-bar" style="width:0%"></div></div>
            </div>
        </div>

        <input type="text" id="barcode-input" class="form-control mb-3" placeholder="BIPE O PACOTE" autofocus autocomplete="off">

        <div class="row no-gutters mb-3">
            <div class="col-4 px-1 text-center"><h6>OK</h6><ul id="l-ok" class="list-section"></ul></div>
            <div class="col-4 px-1 text-center"><h6>Pendentes</h6><ul id="l-pending" class="list-section"></ul></div>
            <div class="col-4 px-1 text-center"><h6>Insucessos</h6><ul id="l-fail" class="list-section"></ul></div>
        </div>

        <div class="card mb-3">
            <div class="card-body p-2">
                <label class="small font-weight-bold">RELATÓRIO WHATSAPP:</label>
                <textarea id="whatsapp-preview" class="form-control" rows="8" readonly></textarea>
            </div>
        </div>
        <button id="copy-btn" class="btn btn-success btn-block btn-lg font-weight-bold mb-4">COPIAR RELATÓRIO</button>
    </div>
</div>

<script>
let data = { id: "", nome: "", motorista: "", orh: "00:00", p: [], ok: [], fail: [] };

document.getElementById('import-btn').onclick = function() {
    const html = document.getElementById('html-input').value;
    if(!html) return;

    // 1. Captura ID da Rota e Nome
    data.id = (html.match(/detail\/(\d+)/) || ["","---"])[1];
    data.nome = (html.match(/<title[^>]*>.*?\|\s*([^<|]+)/i) || ["","Rota"])[1].trim();

    // 2. Captura Motorista e Tempo de Rota (ORH)
    data.motorista = (html.match(/"driver_name":"(.*?)"/) || ["","Desconhecido"])[1];
    data.orh = (html.match(/"duration":"(.*?)"/) || ["","00:00"])[1];

    // 3. CAPTURA DE PACOTES (Apenas dentro do array "shipments")
    // Isso evita pegar os 165 números de sistema e foca apenas nos IDs de pacotes
    const shipmentsBlock = html.match(/"shipments":\[(.*?)\]/);
    if(shipmentsBlock) {
        const regex = /"id":(\d{11}),.*?"status":"(.*?)"(?:.*?"substatus":"(.*?)")?/g;
        let m;
        data.p = []; data.ok = []; data.fail = [];

        while ((m = regex.exec(shipmentsBlock[1])) !== null) {
            let item = { id: m[1], motivo: (m[3] || "Sem motivo").replace(/_/g, ' ') };
            if (m[2] === 'delivered') data.ok.push(item);
            else if (m[2] === 'not_delivered' || m[2] === 'cancelled') data.fail.push(item);
            else data.p.push(item);
        }
    }

    if(data.p.length + data.ok.length + data.fail.length > 0) {
        document.getElementById('route-name-ui').innerText = "Rota: " + data.id;
        document.getElementById('driver-ui').innerText = "Motorista: " + data.motorista;
        document.getElementById('setup-view').classList.add('d-none');
        document.getElementById('work-view').classList.remove('d-none');
        update();
    } else { alert("Nenhum pacote real encontrado. Use Ctrl+U na página da rota."); }
};

document.getElementById('barcode-input').onkeypress = function(e) {
    if (e.key === 'Enter') {
        const val = this.value.trim();
        let idx = data.p.findIndex(x => x.id === val);
        if (idx !== -1) {
            data.ok.unshift(data.p.splice(idx, 1)[0]);
            new AudioContext().oscillatorStart(); // Sinal sonoro simplificado
        }
        this.value = ""; update();
    }
};

function update() {
    document.getElementById('ui-pending').innerText = data.p.length;
    document.getElementById('ui-done').innerText = data.ok.length;
    document.getElementById('ui-fail').innerText = data.fail.length;
    
    let total = data.p.length + data.ok.length;
    document.getElementById('ui-bar').style.width = (total > 0 ? (data.ok.length/total*100) : 0) + "%";

    document.getElementById('l-ok').innerHTML = data.ok.map(x => `<li class="list-group-item text-success">✅ ${x.id}</li>`).join('');
    document.getElementById('l-pending').innerHTML = data.p.map(x => `<li class="list-group-item text-danger">❌ ${x.id}</li>`).join('');
    document.getElementById('l-fail').innerHTML = data.fail.map(x => `<li class="list-group-item text-warning">⚠️ ${x.id}<span class="motivo-tag">${x.motivo}</span></li>`).join('');

    // RELATÓRIO FORMATADO
    const perc = ((data.ok.length / (data.p.length + data.ok.length + data.fail.length)) * 100).toFixed(1);
    let msg = `↩ RTS - Rota: ${data.id}\n🏭 SVC/XPT: EMN1 - Imperatriz\n🕗 ORH: ${data.orh}\n🟢 %DS: ${perc}%\n🟡 Pendentes: ${data.p.length}\n🔴 Insucessos: ${data.fail.length}\n\n♎ Justificativa:\nRota ${data.nome}\nMotorista: ${data.motorista}\n\n`;
    
    if(data.fail.length > 0) {
        msg += `*MOTIVOS DE INSUCESSO:*\n`;
        data.fail.forEach(f => msg += `- ${f.id}: ${f.motivo}\n`);
    }
    document.getElementById('whatsapp-preview').value = msg;
}

document.getElementById('copy-btn').onclick = function() {
    navigator.clipboard.writeText(document.getElementById('whatsapp-preview').value);
    this.innerText = "✅ RELATÓRIO COPIADO!";
    setTimeout(() => this.innerText = "COPIAR RELATÓRIO", 2000);
};
</script>
</body>
</html>
