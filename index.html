<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conferência de Rota - EMN1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 800px; margin-top: 30px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #conferidos-list, #faltantes-list { max-height: 200px; overflow-y: auto; }
        .stat-box { text-align: center; padding: 15px; border-radius: 10px; color: white; }
        .bg-pendente { background-color: #e74c3c; }
        .bg-conferido { background-color: #2ecc71; }
        .bg-total { background-color: #3498db; }
    </style>
</head>
<body>

<div class="container">
    <div id="initial-interface" class="card p-4">
        <h2 class="text-center mb-4">📦 Importar Rota</h2>
        <div class="mb-3">
            <label class="form-label">Cole o HTML da Rota (Ctrl+U e Ctrl+A na página do AdminML):</label>
            <textarea id="html-input" class="form-control" rows="8" placeholder="Cole aqui..."></textarea>
        </div>
        <button id="extract-btn" class="btn btn-primary btn-lg w-100">Iniciar Conferência 🚀</button>
    </div>

    <div id="conference-interface" class="card p-4 d-none">
        <h3 class="text-center mb-3">Bipagem em Curso</h3>
        
        <div class="row mb-3 g-2">
            <div class="col-4">
                <div class="stat-box bg-total">
                    <small>Total</small><br><strong id="extracted-total">0</strong>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-box bg-conferido">
                    <small>Bipados</small><br><strong id="verified-total">0</strong>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-box bg-pendente">
                    <small>Faltam</small><br><strong id="faltantes-total">0</strong>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <input type="text" id="barcode-input" class="form-control form-control-lg text-center" placeholder="Bipe o código de barras aqui" autofocus>
        </div>

        <div class="row">
            <div class="col-6">
                <h6>✅ Conferidos</h6>
                <ul id="conferidos-list" class="list-group"></ul>
            </div>
            <div class="col-6">
                <h6>❌ Faltantes</h6>
                <ul id="faltantes-list" class="list-group"></ul>
            </div>
        </div>

        <hr>

        <button id="generate-report-btn" class="btn btn-success btn-lg w-100 mb-2">
            Copiar Relatório WhatsApp 📱
        </button>
        
        <button id="back-btn" class="btn btn-outline-secondary w-100">Reiniciar / Nova Rota</button>
    </div>
</div>

<script src="conferencia.js"></script>
</body>
</html>
